# Cortex Configuration File
# This file contains default settings for the Cortex CLI tool

models:
  ollama:
    host: http://localhost:11434
    model: llama3.2
  tts:
    # TTS Engine: "say" (macOS native) or "piper" (requires installation)
    engine: say

    # Default voice
    voice: Samantha  # macOS voice name

    # Multiple voices for different speakers
    # macOS native voices (no installation required):
    voices:
      narrator: Samantha    # Female, natural and clear
      host: Alex            # Male, clear and friendly
      expert: Victoria      # Female, professional
      interviewer: Daniel   # Male, British accent
      analyst: Karen        # Female, Australian accent

    # To use Piper TTS instead, uncomment below and set engine to "piper":
    # engine: piper
    # voice: ~/.local/share/piper/voices/en_US-lessac-medium.onnx
    # voices:
    #   narrator: ~/.local/share/piper/voices/en_US-lessac-medium.onnx
    #   host: ~/.local/share/piper/voices/en_US-ryan-high.onnx
    #   expert: ~/.local/share/piper/voices/en_US-amy-medium.onnx
    #   interviewer: ~/.local/share/piper/voices/en_US-joe-medium.onnx
    #   analyst: ~/.local/share/piper/voices/en_US-ljspeech-high.onnx
    #
    # Download Piper voices with: make download-voices
    # More voices: say -v '?' | grep en_US

output:
  directory: ./output

  # Target video duration in minutes (actual duration may vary slightly)
  # Based on ~150 words per minute of speech
  # Can be overridden with --duration flag
  duration: 10  # Default: 10 minutes

  video:
    format: mp4
    background: gradient  # Options: gradient, solid, image
    waveform: true        # Show audio waveform visualization
