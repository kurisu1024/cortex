# Cortex Configuration File
# This file contains default settings for the Cortex CLI tool

models:
  ollama:
    host: http://localhost:11434
    model: llama3
  tts:
    engine: piper
    # Path to Piper voice model (.onnx file)
    # Download from: https://huggingface.co/rhasspy/piper-voices
    voice: ~/.local/share/piper/voices/en_US-lessac-medium.onnx

output:
  directory: ./output
  video:
    format: mp4
    background: gradient  # Options: gradient, solid, image
    waveform: true        # Show audio waveform visualization
