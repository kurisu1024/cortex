# Cortex Configuration File
# This file contains default settings for the Cortex CLI tool

models:
  ollama:
    host: http://localhost:11434
    model: llama3
  tts:
    engine: piper
    # Default voice (used if no multiple voices configured)
    voice: ~/.local/share/piper/voices/en_US-lessac-medium.onnx

    # Multiple voices for different speakers (optional)
    # When configured, Cortex will rotate between these voices for each segment
    # Download all voices with: make download-voices
    # Or download specific quality: make download-voice-medium OR make download-voice-high
    voices:
      narrator: ~/.local/share/piper/voices/en_US-lessac-medium.onnx    # Female, medium
      host: ~/.local/share/piper/voices/en_US-ryan-high.onnx            # Male, high
      expert: ~/.local/share/piper/voices/en_US-amy-medium.onnx         # Female, medium
      interviewer: ~/.local/share/piper/voices/en_US-joe-medium.onnx    # Male, medium
      analyst: ~/.local/share/piper/voices/en_US-ljspeech-high.onnx     # Female, high
      # Additional available voices (after running make download-voices):
      # - ~/.local/share/piper/voices/en_US-kristin-medium.onnx         # Female, medium
      # - ~/.local/share/piper/voices/en_US-ryan-medium.onnx            # Male, medium
      # - ~/.local/share/piper/voices/en_US-libritts_r-high.onnx        # Multi-speaker, high

output:
  directory: ./output

  # Target video duration in minutes (actual duration may vary slightly)
  # Based on ~150 words per minute of speech
  # Can be overridden with --duration flag
  duration: 10  # Default: 10 minutes

  video:
    format: mp4
    background: gradient  # Options: gradient, solid, image
    waveform: true        # Show audio waveform visualization
