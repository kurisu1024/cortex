# Cortex Configuration File
# This file contains default settings for the Cortex CLI tool

models:
  ollama:
    host: http://localhost:11434
    model: llama3.2

  image:
    # AI Image Generation
    # Model options:
    #   stabilityai/sdxl-turbo     - Fastest (5-10s on M4 GPU), best quality, 1 step
    #   stabilityai/sd-turbo       - Fast (3-5s on M4 GPU), good quality, 1 step
    #   runwayml/stable-diffusion-v1-5 - Slower (2-3min CPU), 30 steps
    model_id: stabilityai/sdxl-turbo
    art_style: cinematic, high quality, 4k, detailed
    steps: 30        # Inference steps (ignored for turbo models, they use 1 step)
    guidance: 7.5    # How closely to follow prompt (ignored for turbo models)

  tts:
    # TTS Engine: "edgetts" (Microsoft Edge, high quality), "say" (macOS), or "piper"
    engine: edgetts

    # Default voice
    voice: en-US-AriaNeural  # Edge TTS voice name

    # Multiple voices for different speakers
    # Edge TTS neural voices (high quality, free, requires internet):
    voices:
      narrator: en-US-AriaNeural      # Female, professional, news-style
      host: en-US-GuyNeural           # Male, passionate and energetic
      expert: en-US-JennyNeural       # Female, friendly and considerate
      interviewer: en-GB-RyanNeural   # Male, British accent
      analyst: en-US-EmmaNeural       # Female, cheerful and clear

    # List all available Edge TTS voices: edge-tts --list-voices
    # Popular voices:
    #   en-US-AriaNeural (F), en-US-GuyNeural (M), en-US-JennyNeural (F)
    #   en-GB-SoniaNeural (F), en-AU-NatashaNeural (F), en-CA-LiamNeural (M)

    # Alternative engines:
    # macOS say (offline, medium quality):
    #   engine: say
    #   voices: {narrator: Samantha, host: Alex, expert: Victoria}
    #
    # Piper TTS (offline, requires setup):
    #   engine: piper
    #   voice: ~/.local/share/piper/voices/en_US-lessac-medium.onnx

output:
  directory: ./output

  # Target video duration in minutes (actual duration may vary slightly)
  # Based on ~150 words per minute of speech
  # Can be overridden with --duration flag
  duration: 10  # Default: 10 minutes

  video:
    format: mp4
    background: ai-generated  # Options: gradient, solid, image, ai-generated
    waveform: false        # Show audio waveform visualization
    animated: true         # Use AnimateDiff for animated cartoon clips (vs static images)
    animation_frames: 10   # Frames per animated clip (8=1s, 10=1.25s, 12=1.5s, 16=2s)

    # Animation modes:
    # - animated: false - Static images with Ken Burns zoom/pan effects (fast, ~5-10s per image)
    # - animated: true  - Actual animated cartoon clips with character motion
    #
    # Optimized animation performance (M4 GPU):
    # - 8 frames  (1.0s): ~8-10 seconds per clip, ~1.5GB memory
    # - 10 frames (1.25s): ~10-12 seconds per clip, ~2GB memory (recommended)
    # - 12 frames (1.5s): ~12-14 seconds per clip, ~2.5GB memory
    # - 16 frames (2.0s): ~15-18 seconds per clip, ~3GB memory
    #
    # Optimizations: fp16 precision, CPU offloading, reduced inference steps (15)
